<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎙️ AI 直播策划助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 48px; }
    header .emoji { font-size: 48px; margin-bottom: 12px; }
    header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    header p { color: #888; font-size: 14px; }
    .card { background: #13131a; border: 1px solid #222230; border-radius: 16px; padding: 32px; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: #0a0a0f; border: 1px solid #222230; border-radius: 10px; padding: 12px 16px; color: #e0e0e0; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #667eea; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result { display: none; }
    #result.show { display: block; }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .result-header h2 { font-size: 16px; color: #888; }
    .btn-copy { padding: 6px 14px; background: #222230; border: 1px solid #333; border-radius: 6px; color: #aaa; font-size: 12px; cursor: pointer; }
    .btn-copy:hover { background: #2a2a3a; color: #fff; }
    #plan-content { background: #0a0a0f; border: 1px solid #222230; border-radius: 10px; padding: 24px; font-size: 14px; line-height: 1.8; color: #ccc; max-height: 600px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    #plan-content h1 { font-size: 20px; color: #fff; margin-bottom: 16px; }
    #plan-content h2 { font-size: 16px; color: #667eea; margin: 20px 0 10px; border-bottom: 1px solid #222; padding-bottom: 4px; }
    #plan-content h3 { font-size: 14px; color: #a0a0c0; margin: 12px 0 6px; }
    #plan-content ul { padding-left: 20px; }
    #plan-content ol { padding-left: 20px; }
    .error-msg { background: #1a0a0a; border: 1px solid #3a1010; border-radius: 10px; padding: 16px; color: #e88; text-align: center; }
    footer { text-align: center; color: #444; font-size: 12px; margin-top: 40px; }
    footer a { color: #667eea; text-decoration: none; }
    .loading-tip { text-align: center; color: #666; font-size: 13px; padding: 12px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .card { padding: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="emoji">🎙️</div>
      <h1>AI 直播策划助手</h1>
      <p>输入主题，AI 帮你生成完整直播策划方案</p>
    </header>

    <div class="card">
      <form id="plan-form">
        <div class="form-group">
          <label>直播主题 *</label>
          <input type="text" id="topic" placeholder="例如：AI Agent 如何重塑内容创作" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>目标受众</label>
            <input type="text" id="audience" placeholder="例如：技术创业者、开发者">
          </div>
          <div class="form-group">
            <label>直播时长</label>
            <select id="duration">
              <option value="60">60 分钟</option>
              <option value="90" selected>90 分钟</option>
              <option value="120">120 分钟</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>特别要求（可选）</label>
          <textarea id="focus" placeholder="例如：重点讲实操案例、要有观众连麦环节、要有PPT演示"></textarea>
        </div>
        <button type="submit" class="btn" id="submit-btn">
          <span id="btn-text">✨ 开始生成策划方案</span>
        </button>
        <div class="loading-tip" id="loading-tip" style="display:none">AI 正在思考中，预计需要 15~25 秒，请稍候...</div>
      </form>
    </div>

    <div class="card" id="result">
      <div class="result-header">
        <h2>📋 策划方案</h2>
        <button class="btn-copy" id="copy-btn">📋 复制全文</button>
      </div>
      <div id="plan-content"></div>
    </div>
  </div>

  <script>
    const API_KEY = 'sk-api-mMCMRX4hymGuq92xjmt-wTf_B3jbsXkzHagVocr4a-Cj7nvUGeOP9nGhuWKJBWvyxaCK8Aq8PWJuP0o7M_WrelIBkpMGgrTXonBFNA9rKrYc63wSNOL3iNM';
    const API_URL = 'https://api.minimax.chat/v1/text/chatcompletion_v2';

    const form = document.getElementById('plan-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const resultDiv = document.getElementById('result');
    const planContent = document.getElementById('plan-content');
    const copyBtn = document.getElementById('copy-btn');
    const loadingTip = document.getElementById('loading-tip');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = document.getElementById('topic').value.trim();
      const audience = document.getElementById('audience').value.trim();
      const duration = parseInt(document.getElementById('duration').value);
      const focus = document.getElementById('focus').value.trim();

      if (!topic) { alert('请输入直播主题'); return; }

      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>策划中...';
      loadingTip.style.display = 'block';
      resultDiv.classList.remove('show');

      const today = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

      const prompt = `你是一名 AI/大模型领域的技术内容策划。输出必须满足以下所有要求。

【格式要求 - 必须严格遵守】
- 不得使用"某公司/某平台/某电商"等模糊描述，必须给出真实公司名、产品名、项目名
- 不得使用"3~5 个要点"这种模糊说法，必须给出具体数字
- 不得省略任何章节，全部输出
- 每个实战案例必须包含：公司名 + 使用的模型 + 关键参数 + 性能指标对比（Before/After 具体数字）

【输出格式】

# 🎙️ 【${topic}】技术直播策划

## 📌 直播信息卡
| 项目 | 内容 |
|------|------|
| 主题 | ${topic} |
| 受众 | ${audience || 'AI/ML 工程师、研究员'} |
| 时长 | ${duration} 分钟 |
| 技术门槛 | 🟡 有基础 |

## 🎯 技术定位
这场直播要解决的具体技术问题（1句话）：

## 📋 技术大纲

### 开场（${Math.round(duration * 0.05)} 分钟）
- 技术钩子（反直觉数据/问题，60秒内抛出）：
- 直播承诺：

### Part 1：核心技术原理（${Math.round(duration * 0.2)} 分钟）

**技术点 1：**
- 原理：
- 关键参数/数字：
- 参考：arXiv:XXXX.XXXXX 或 GitHub:xxxx/xxxx（star:XX）

**技术点 2：**

**技术点 3：**

**对比表**（本技术 vs 主要竞品，必须用 Markdown 表格）：
| 维度 | 本技术 | 竞品A | 竞品B |
|------|--------|-------|-------|
| 延迟 | | | |
| 准确率 | | | |
| 成本 | | | |
| 适用场景 | | | |

### Part 2：生产级实战案例（${Math.round(duration * 0.3)} 分钟）

**案例 1：[具体公司/产品名]**
- 背景：
- 技术栈：
- 关键参数：
- 性能对比（Before vs After）：
  - 指标A：XX% → YY%
  - 指标B：XXms → YYms
- 技术踩坑：
  - 坑1：原因 + 解决
  - 坑2：
- 核心代码片段：

**案例 2：[具体公司/产品名]**

### Part 3：技术争议（${Math.round(duration * 0.1)} 分钟）
**争议：**
- 甲方（论文/项目）：
- 乙方（论文/项目）：
- 技术现实：
- 给工程师的建议：

### 互动（${Math.round(duration * 0.08)} 分钟）
- 弹幕投票（技术选型）：
- Demo 描述：

### Q&A（${Math.round(duration * 0.12)} 分钟）
| # | 问题 | 参考答案 | 延伸 |
|---|------|---------|------|
| 1 | | | |
| 2 | | | |
| 3 | | | |
| 4 | | | |
| 5 | | | |
| 6 | | | |

## 📢 预热文案
### 公众号（技术向，200字）
### 开发者社区（50字）
### Twitter英文版（120字）

## 📊 技术复盘
| 维度 | 关注点 |
|------|--------|
| 技术观众占比 | |
| 深度技术问题比例 | |
| 社区传播 | |
| 回放持续观看 | |

---
*InfoQ AI 直播策划助手*`;

    

    

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'MiniMax-Text-01',
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.75,
            max_tokens: 4000
          })
        });

        const data = await response.json();
        if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
          let content = data.choices[0].message.content;
          content = content.replace(/^```markdown\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/, '');
          planContent.textContent = content;
          resultDiv.classList.add('show');
        } else {
          const errMsg = data.base_resp?.status_msg || JSON.stringify(data).slice(0, 100);
          planContent.innerHTML = '<div class="error-msg">😕 生成失败了，错误：' + errMsg + '</div>';
          resultDiv.classList.add('show');
        }
      } catch (err) {
        planContent.innerHTML = '<div class="error-msg">😕 网络错误：' + err.message + '，请检查网络后重试</div>';
        resultDiv.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        btnText.textContent = '✨ 再次生成策划方案';
        loadingTip.style.display = 'none';
      }
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(planContent.innerText).then(() => {
        copyBtn.textContent = '✅ 已复制';
        setTimeout(() => { copyBtn.textContent = '📋 复制全文'; }, 2000);
      });
    });
  </script>
</body>
</html>
